name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:

jobs:
  test-and-build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true

      - name: Check formatting
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          files=$(find . -name '*.go' -print)
          unformatted=$(gofmt -l $files)
          if [ -n "$unformatted" ]; then
            echo "Unformatted Go files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Test (race)
        if: matrix.os == 'ubuntu-latest'
        env:
          CGO_ENABLED: "1"
        run: go test -race ./...

      - name: Build
        run: go build ./...
